<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
</head>
<body>

    <h2>Your Score: <span id="score"></span></h2>

    <script>
        let score = localStorage.getItem("score");
        let quiz = JSON.parse(localStorage.getItem("quiz")) || [];

        document.getElementById("score").innerText = score + " / " + quiz.length;
    </script>

</body>
</html>
